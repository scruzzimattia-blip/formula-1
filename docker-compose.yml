version: '3.8'

services:
  f1-dashboard:
    build: .
    container_name: f1-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./fastf1_cache:/app/fastf1_cache
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
